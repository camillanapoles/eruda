<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title data-i18n="extensionName">Eruda Extension</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <!-- Header -->
    <header class="header">
      <img src="../icons/icon-48.png" class="header-logo" alt="" />
      <span class="header-title" data-i18n="extensionName">Eruda Extension</span>
    </header>

    <!-- Toggle Eruda -->
    <section class="section">
      <div class="toggle-row">
        <span class="toggle-label" data-i18n="popupToggleEruda">Eruda DevTools</span>
        <label class="switch" title="">
          <input type="checkbox" id="eruda-toggle" />
          <span class="slider"></span>
        </label>
      </div>
    </section>

    <!-- Stats bar -->
    <section class="stats-bar">
      <div class="stat-item" id="stat-scripts">
        <span class="stat-num" id="scripts-count">0</span>
        <span class="stat-label" data-i18n="popupStatScripts">Scripts</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item" id="stat-snippets">
        <span class="stat-num" id="snippets-count">0</span>
        <span class="stat-label" data-i18n="popupStatSnippets">Snippets</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item stat-errors" id="stat-errors">
        <span class="stat-num" id="errors-count">0</span>
        <span class="stat-label" data-i18n="popupStatErrors">Errors</span>
      </div>
    </section>

    <!-- Quick-run snippets -->
    <section class="section">
      <div class="section-header">
        <span data-i18n="popupQuickSnippets">Quick Snippets</span>
        <button class="btn-link" id="manage-snippets" data-i18n="popupManage">Manage</button>
      </div>
      <ul class="snippet-list" id="snippet-list">
        <li class="empty-hint" data-i18n="popupNoSnippets">No snippets yet</li>
      </ul>
    </section>

    <!-- Navigation links -->
    <nav class="nav-links">
      <button class="nav-btn" id="btn-options" data-i18n="popupOpenOptions">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M12 15.5A3.5 3.5 0 018.5 12 3.5 3.5 0 0112 8.5a3.5 3.5 0 013.5 3.5 3.5 3.5 0 01-3.5 3.5m7.43-2.92c.04-.33.07-.67.07-1.08s-.03-.75-.07-1.08l2.32-1.82c.21-.16.27-.46.13-.7l-2.2-3.81c-.14-.24-.42-.32-.66-.24l-2.73 1.1c-.57-.44-1.17-.8-1.84-1.09l-.41-2.91c-.04-.26-.28-.46-.55-.46H8.96c-.27 0-.51.2-.55.46l-.41 2.91c-.67.29-1.27.65-1.84 1.09l-2.73-1.1c-.24-.09-.52 0-.66.24l-2.2 3.81c-.15.24-.08.54.13.7l2.32 1.82c-.04.33-.08.67-.08 1.08s.04.75.08 1.08L1.72 14.4c-.21.16-.27.46-.13.7l2.2 3.81c.14.24.42.32.66.24l2.73-1.1c.57.44 1.17.8 1.84 1.09l.41 2.91c.04.26.28.46.55.46h4.4c.27 0 .51-.2.55-.46l.41-2.91c.67-.29 1.27-.65 1.84-1.09l2.73 1.1c.24.09.52 0 .66-.24l2.2-3.81c.14-.24.08-.54-.13-.7l-2.32-1.82z"/></svg>
        <span data-i18n="popupOpenOptions">Options</span>
      </button>
    </nav>

    <!-- Status message -->
    <div class="status-msg" id="status-msg" hidden></div>

    <script src="popup.js" type="module"></script>
  </body>
</html>
