<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title data-i18n="optionsTitle">Eruda Extension — Options</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <!-- Header -->
    <header class="header">
      <img src="../icons/icon-48.png" class="header-logo" alt="" />
      <span class="header-title" data-i18n="extensionName">Eruda Extension</span>
      <div class="header-spacer"></div>
      <button class="btn-icon" id="btn-export-all" title="Export all data">
        <svg viewBox="0 0 24 24" width="22" height="22"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
      </button>
    </header>

    <!-- Tab bar -->
    <nav class="tab-bar" role="tablist">
      <button class="tab-btn active" role="tab" data-tab="scripts" data-i18n="tabScripts">Scripts</button>
      <button class="tab-btn" role="tab" data-tab="snippets" data-i18n="tabSnippets">Snippets</button>
      <button class="tab-btn" role="tab" data-tab="debug" data-i18n="tabDebug">Debug</button>
      <button class="tab-btn" role="tab" data-tab="settings" data-i18n="tabSettings">Settings</button>
    </nav>

    <!-- ===== SCRIPTS TAB ===== -->
    <div class="tab-panel active" id="tab-scripts" role="tabpanel">
      <div class="panel-toolbar">
        <button class="btn-primary" id="btn-add-script" data-i18n="btnAddScript">+ Add Script</button>
        <button class="btn-secondary" id="btn-import-script" data-i18n="btnImportScript">Import</button>
        <button class="btn-secondary" id="btn-export-scripts" data-i18n="btnExport">Export</button>
      </div>

      <!-- Install from URL bar -->
      <div class="url-install-bar" id="url-install-bar" hidden>
        <input type="url" id="script-url-input" class="text-input" placeholder="https://example.com/script.user.js" />
        <button class="btn-primary" id="btn-install-url" data-i18n="btnInstall">Install</button>
        <button class="btn-ghost" id="btn-cancel-url">✕</button>
      </div>

      <ul class="item-list" id="scripts-list">
        <li class="empty-state" data-i18n="emptyScripts">No user scripts installed yet.</li>
      </ul>

      <!-- Script editor -->
      <div class="editor-panel" id="script-editor" hidden>
        <div class="editor-header">
          <span class="editor-title" id="editor-script-title" data-i18n="editorNewScript">New Script</span>
          <div class="editor-actions">
            <button class="btn-ghost" id="btn-editor-cancel" data-i18n="btnCancel">Cancel</button>
            <button class="btn-primary" id="btn-editor-save" data-i18n="btnSave">Save</button>
          </div>
        </div>
        <!-- Metadata fields -->
        <div class="meta-grid">
          <label class="meta-label" data-i18n="fieldName">Name</label>
          <input type="text" id="editor-script-name" class="text-input" />

          <label class="meta-label" data-i18n="fieldDescription">Description</label>
          <input type="text" id="editor-script-desc" class="text-input" />

          <label class="meta-label" data-i18n="fieldMatchPatterns">Match Patterns</label>
          <input type="text" id="editor-script-match" class="text-input" placeholder="*://*.example.com/* (one per line)" />

          <label class="meta-label" data-i18n="fieldRunAt">Run At</label>
          <select id="editor-script-runat" class="select-input">
            <option value="document-start">document-start</option>
            <option value="document-end">document-end</option>
            <option value="document-idle" selected>document-idle</option>
          </select>
        </div>
        <textarea id="editor-script-code" class="code-editor" spellcheck="false" placeholder="// ==UserScript==
// @name        My Script
// @match       *://*.example.com/*
// @grant       GM_log
// ==/UserScript==

console.log('Hello from user script!');
"></textarea>
      </div>
    </div>

    <!-- ===== SNIPPETS TAB ===== -->
    <div class="tab-panel" id="tab-snippets" role="tabpanel">
      <div class="panel-toolbar">
        <button class="btn-primary" id="btn-add-snippet" data-i18n="btnAddSnippet">+ Add Snippet</button>
        <button class="btn-secondary" id="btn-import-snippet" data-i18n="btnImport">Import</button>
        <button class="btn-secondary" id="btn-export-snippets" data-i18n="btnExport">Export</button>
      </div>

      <ul class="item-list" id="snippets-list">
        <li class="empty-state" data-i18n="emptySnippets">No snippets yet.</li>
      </ul>

      <!-- Snippet editor -->
      <div class="editor-panel" id="snippet-editor" hidden>
        <div class="editor-header">
          <span class="editor-title" id="editor-snippet-title" data-i18n="editorNewSnippet">New Snippet</span>
          <div class="editor-actions">
            <button class="btn-ghost" id="btn-snippet-editor-cancel" data-i18n="btnCancel">Cancel</button>
            <button class="btn-primary" id="btn-snippet-editor-save" data-i18n="btnSave">Save</button>
          </div>
        </div>
        <div class="meta-grid">
          <label class="meta-label" data-i18n="fieldName">Name</label>
          <input type="text" id="editor-snippet-name" class="text-input" />

          <label class="meta-label" data-i18n="fieldDescription">Description</label>
          <input type="text" id="editor-snippet-desc" class="text-input" />

          <label class="meta-label" data-i18n="fieldAutoRun">Auto-run on</label>
          <input type="text" id="editor-snippet-runon" class="text-input" placeholder="*://*.example.com/* (comma separated)" />

          <label class="meta-label"></label>
          <label class="checkbox-label">
            <input type="checkbox" id="editor-snippet-autorun" />
            <span data-i18n="fieldAutoRunEnabled">Enable auto-run</span>
          </label>

          <label class="meta-label"></label>
          <label class="checkbox-label">
            <input type="checkbox" id="editor-snippet-enabled" checked />
            <span data-i18n="fieldEnabled">Enabled</span>
          </label>
        </div>
        <textarea id="editor-snippet-code" class="code-editor" spellcheck="false" placeholder="// JavaScript to execute"></textarea>
      </div>
    </div>

    <!-- ===== DEBUG TAB ===== -->
    <div class="tab-panel" id="tab-debug" role="tabpanel">
      <div class="panel-toolbar">
        <button class="btn-secondary" id="btn-clear-resolved" data-i18n="btnClearResolved">Clear Resolved</button>
        <button class="btn-danger" id="btn-clear-errors" data-i18n="btnClearAll">Clear All</button>
        <div class="filter-row">
          <select id="debug-filter-type" class="select-input select-sm">
            <option value="">All Types</option>
            <option value="runtime">Runtime</option>
            <option value="syntax">Syntax</option>
            <option value="network">Network</option>
            <option value="promise">Promise</option>
            <option value="csp">CSP</option>
            <option value="script">Script</option>
          </select>
          <select id="debug-filter-severity" class="select-input select-sm">
            <option value="">All Severity</option>
            <option value="critical">Critical</option>
            <option value="error">Error</option>
            <option value="warning">Warning</option>
            <option value="info">Info</option>
          </select>
        </div>
      </div>

      <ul class="error-list" id="error-list">
        <li class="empty-state" data-i18n="emptyErrors">No errors captured.</li>
      </ul>
    </div>

    <!-- ===== SETTINGS TAB ===== -->
    <div class="tab-panel" id="tab-settings" role="tabpanel">
      <div class="settings-group">
        <h3 class="settings-group-title" data-i18n="settingsAutoInject">Auto-inject</h3>
        <label class="setting-row">
          <span class="setting-label" data-i18n="settingAutoInjectEruda">Auto-inject Eruda on matching pages</span>
          <input type="checkbox" id="setting-auto-inject" class="setting-checkbox" />
        </label>
        <label class="setting-row">
          <span class="setting-label" data-i18n="settingAutoInjectPatterns">URL patterns (one per line)</span>
        </label>
        <textarea id="setting-inject-patterns" class="text-input patterns-input" placeholder="*://*.example.com/*"></textarea>
      </div>

      <div class="settings-group">
        <h3 class="settings-group-title" data-i18n="settingsDebug">Debug</h3>
        <label class="setting-row">
          <span class="setting-label" data-i18n="settingErrorCapture">Enable error capture</span>
          <input type="checkbox" id="setting-error-capture" class="setting-checkbox" checked />
        </label>
        <label class="setting-row">
          <span class="setting-label" data-i18n="settingThrottleMs">Throttle (ms between reports)</span>
          <input type="number" id="setting-throttle-ms" class="text-input input-sm" min="0" max="5000" step="50" value="100" />
        </label>
      </div>

      <div class="settings-group">
        <h3 class="settings-group-title" data-i18n="settingsData">Data</h3>
        <div class="setting-actions">
          <button class="btn-secondary" id="btn-backup" data-i18n="btnBackup">Backup all data</button>
          <button class="btn-secondary" id="btn-restore" data-i18n="btnRestore">Restore from backup</button>
        </div>
        <p class="quota-info" id="quota-info"></p>
      </div>

      <div class="settings-group">
        <button class="btn-primary" id="btn-save-settings" data-i18n="btnSaveSettings">Save Settings</button>
      </div>
    </div>

    <!-- Status toast -->
    <div class="toast" id="toast" hidden></div>

    <!-- Hidden file input for imports -->
    <input type="file" id="file-import" accept=".json,.js,.user.js" hidden />

    <script src="options.js" type="module"></script>
  </body>
</html>
